<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Matematik</title></head>
<body>
<h1>🧠 Matematik Oyunu</h1>
<p id="q"></p>
<input id="a"><button onclick="check()">Cevapla</button>
<script>
let x,y;
function newQ(){
x=Math.floor(Math.random()*10);
y=Math.floor(Math.random()*10);
document.getElementById("q").innerText=x+" + "+y+" = ?";
}
function check(){
let ans=Number(document.getElementById("a").value);
if(ans===x+y){
alert("Doğru! +10 coin");
localStorage.coin=Number(localStorage.coin||0)+10;
}
newQ();
document.getElementById("a").value="";
}
newQ();
</script></body></html>
